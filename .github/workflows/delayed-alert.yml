name: Send Delayed Alert

on:
  workflow_dispatch:
    inputs:
      force_send:
        description: 'Ignore time filter and send immediately'
        required: false
        default: 'false'

jobs:
  send-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Check KR public holiday (Asia/Seoul)
        id: holiday_check
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime
          from zoneinfo import ZoneInfo

          seoul_now = datetime.now(ZoneInfo("Asia/Seoul"))
          today = seoul_now.strftime("%Y-%m-%d")
          year = seoul_now.strftime("%Y")
          url = f"https://date.nager.at/api/v3/PublicHolidays/{year}/KR"

          is_holiday = False
          try:
            with urllib.request.urlopen(url, timeout=10) as response:
              holidays = json.loads(response.read().decode("utf-8"))
            is_holiday = any(item.get("date") == today for item in holidays)
          except Exception as error:
            print(f"Holiday API check failed: {error}")

          github_output = os.environ.get("GITHUB_OUTPUT")
          if github_output:
            with open(github_output, "a", encoding="utf-8") as f:
              f.write(f"is_holiday={'true' if is_holiday else 'false'}\n")
              f.write(f"today={today}\n")

          print(f"KST date: {today}, is_holiday={is_holiday}")
          PY

      - name: Check security setting alert times (Asia/Seoul)
        id: time_check
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SECRET_API_KEY: ${{ secrets.SUPABASE_SECRET_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FORCE_SEND: ${{ github.event.inputs.force_send || 'false' }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime
          from zoneinfo import ZoneInfo

          force_send = str(os.environ.get("FORCE_SEND", "false")).lower() == "true"
          supabase_url = os.environ.get("SUPABASE_URL", "").strip()
          service_role = os.environ.get("SUPABASE_SERVICE_ROLE_KEY", "").strip()
          secret_key = os.environ.get("SUPABASE_SECRET_API_KEY", "").strip()
          key = service_role or secret_key

          now_hm = datetime.now(ZoneInfo("Asia/Seoul")).strftime("%H:%M")
          configured = ["14:00", "19:00"]

          if not force_send and supabase_url and key:
            try:
              endpoint = (
                f"{supabase_url.rstrip('/')}/rest/v1/security_setting"
                "?select=google_chat_alert_times&order=created_at.asc&limit=1"
              )
              req = urllib.request.Request(endpoint)
              req.add_header("apikey", key)
              req.add_header("Authorization", f"Bearer {key}")
              with urllib.request.urlopen(req, timeout=10) as response:
                rows = json.loads(response.read().decode("utf-8"))
              if rows and isinstance(rows[0].get("google_chat_alert_times"), list):
                configured = [
                  str(item).strip()
                  for item in rows[0]["google_chat_alert_times"]
                  if isinstance(item, str) and item.strip()
                ] or configured
            except Exception as error:
              print(f"security_setting load error: {error}")

          should_send = force_send or (now_hm in configured)
          reason = "force_send" if force_send else ("time_match" if should_send else "time_miss")

          output = os.environ.get("GITHUB_OUTPUT")
          if output:
            with open(output, "a", encoding="utf-8") as f:
              f.write(f"should_send={'true' if should_send else 'false'}\n")
              f.write(f"now_hm={now_hm}\n")
              f.write(f"reason={reason}\n")

          print(
            json.dumps(
              {
                "now_hm": now_hm,
                "configured_times": configured,
                "should_send": should_send,
                "reason": reason,
              },
              ensure_ascii=False,
            )
          )
          PY

      - name: Invoke Supabase delayed alert function
        if: steps.holiday_check.outputs.is_holiday != 'true' && steps.time_check.outputs.should_send == 'true'
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SECRET_API_KEY: ${{ secrets.SUPABASE_SECRET_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ]; then
            echo "Required secrets are missing."
            echo "- VITE_SUPABASE_URL"
            exit 1
          fi

          FUNCTION_URL="${SUPABASE_URL%/}/functions/v1/send-delayed-alert"
          CLEAN_SECRET_API_KEY="$(printf '%s' "${SUPABASE_SECRET_API_KEY:-}" | tr -d '\r\n')"
          CLEAN_SERVICE_ROLE_KEY="$(printf '%s' "${SUPABASE_SERVICE_ROLE_KEY:-}" | tr -d '\r\n')"
          echo "Calling: ${FUNCTION_URL}"

          call_function() {
            local key="$1"
            curl -sS -o /tmp/function_response.txt -w "%{http_code}" \
              -X POST "${FUNCTION_URL}" \
              -H "Authorization: Bearer ${key}" \
              -H "apikey: ${key}" \
              -H "Content-Type: application/json" \
              --data '{}'
          }

          HTTP_CODE=""
          if [ -n "${CLEAN_SECRET_API_KEY}" ]; then
            HTTP_CODE="$(call_function "${CLEAN_SECRET_API_KEY}")"
          fi

          if [ "${HTTP_CODE:-0}" = "401" ] && [ -n "${CLEAN_SERVICE_ROLE_KEY}" ]; then
            echo "Secret API key call returned 401; retrying with service_role key..."
            HTTP_CODE="$(call_function "${CLEAN_SERVICE_ROLE_KEY}")"
          fi

          if [ -z "${HTTP_CODE}" ]; then
            echo "No usable API key found. Set one of:"
            echo "- SUPABASE_SECRET_API_KEY"
            echo "- SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi

          echo "Status: ${HTTP_CODE}"
          cat /tmp/function_response.txt

          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "Function call failed"
            exit 1
          fi

      - name: Skip reason
        if: steps.holiday_check.outputs.is_holiday == 'true' || steps.time_check.outputs.should_send != 'true'
        run: |
          echo "skip_holiday=${{ steps.holiday_check.outputs.is_holiday }}"
          echo "should_send=${{ steps.time_check.outputs.should_send }}"
          echo "now_hm=${{ steps.time_check.outputs.now_hm }}"
          echo "reason=${{ steps.time_check.outputs.reason }}"
