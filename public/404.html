<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/security-activity-monitoring-system/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>보안 활동 모니터링 시스템</title>

    <script>
      (function () {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        var path = l.pathname
          .split('/')
          .slice(1)
          .map(function (segment) {
            return encodeURIComponent(segment);
          })
          .join('/');
        var search = l.search
          ? '&q=' +
            l.search
              .slice(1)
              .split('&')
              .map(function (param) {
                return encodeURIComponent(param);
              })
              .join('&')
          : '';
        var target =
          l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?p=' +
          path +
          search +
          l.hash;

        l.replace(target);
      })();
    </script>
  </head>
  <body>
    <div></div>
  </body>
</html>
